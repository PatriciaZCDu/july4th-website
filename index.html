<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy July 4th Everyone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Left side balloons -->
  <div class="balloons balloons-left">
    <div class="balloon red"><span class="string"></span></div>
    <div class="balloon white"><span class="string"></span></div>
    <div class="balloon blue"><span class="string"></span></div>
    <div class="balloon red"><span class="string"></span></div>
  </div>

  <!-- Right side balloons -->
  <div class="balloons balloons-right">
    <div class="balloon blue"><span class="string"></span></div>
    <div class="balloon red"><span class="string"></span></div>
    <div class="balloon white"><span class="string"></span></div>
    <div class="balloon blue"><span class="string"></span></div>
  </div>

  <main class="content">
    <div class="stars">✦ ✦ ✦</div>
    <h1>Happy July 4th<span class="flagpole" role="img" aria-label="American flag flying high on a flagpole"><span class="finial"></span><span class="pole"></span><span class="flag"><span class="flag-stripes"></span><span class="flag-canton"></span></span></span><br /><span class="line2">Everyone</span></h1>
    <p>Wishing you a bright &amp; sparkling Independence Day!</p>
    <p class="signoff">— Pat</p>
  </main>
</body>
</html>
